<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Какой ты маяк</title>
    
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
            overflow: hidden;
        }
        .loader {
            font-size: 22px;
            color: #5181b8;
            margin-top: 120px;
            font-weight: 500;
        }
        #vk-id {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.92);
            color: #00ff88;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            z-index: 999999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            display: none;
            border: 2px solid #00ff88;
        }
    </style>
</head>
<body>

    <div class="loader">Загрузка квиза...</div>
    <div id="vk-id">👤 VK ID: <span id="id-value"></span></div>

    <script>
        console.log('🚀 VK Mini App wrapper v4 — максимальная очистка консоли');

        // === Максимальное подавление предупреждений ===
        (function cleanConsole() {
            const originalWarn = console.warn;
            const originalError = console.error;
            const originalLog = console.log;

            console.warn = function(...args) {
                if (typeof args[0] === 'string') {
                    if (args[0].includes('autoplay') ||
                        args[0].includes('mozPressure') ||
                        args[0].includes('mozInputSource') ||
                        args[0].includes('InstallTrigger') ||
                        args[0].includes('message from https://mrqz.me') ||
                        args[0].includes('OpaqueResponseBlocking') ||
                        args[0].includes('Glyph bbox')) {
                        return;
                    }
                }
                originalWarn.apply(console, args);
            };

            console.error = function(...args) {
                if (typeof args[0] === 'string' && args[0].includes('OpaqueResponseBlocking')) return;
                originalError.apply(console, args);
            };

            // Один раз чистим консоль после загрузки
            setTimeout(() => {
                console.clear();
                console.log('%c✅ Консоль очищена и очищена от спама', 'color:#00ff88; font-weight:bold');
            }, 800);
        })();

        // Инициализация Bridge
        vkBridge.send('VKWebAppInit').catch(() => {});

        let vkUserId = null;

        function showVkId(id) {
            vkUserId = id;
            document.getElementById('id-value').textContent = id;
            document.getElementById('vk-id').style.display = 'block';
            window.vkUserId = id;
            window.vk_user_id = id;
        }

        // Получаем ID
        const urlParams = new URLSearchParams(window.location.search);
        vkUserId = urlParams.get('vk_user_id');

        if (vkUserId) {
            console.log('✅ VK User ID получен из URL:', vkUserId);
            showVkId(vkUserId);
        }

        // Bridge (запасной вариант)
        async function tryBridge() {
            try {
                const userInfo = await vkBridge.send('VKWebAppGetUserInfo');
                if (userInfo.id && !vkUserId) showVkId(userInfo.id);
            } catch (e) {}
        }

        function redirectToMarquiz() {
            const baseLink = "https://mrqz.me/69e11b260789030019533d08";
            let finalLink = baseLink;
            if (vkUserId) {
                finalLink += (baseLink.includes('?') ? '&' : '?') + `vk_user_id=${vkUserId}`;
            }
            setTimeout(() => {
                window.location.replace(finalLink);
            }, 1200);
        }

        // Запуск
        window.onload = async () => {
            if (vkUserId) showVkId(vkUserId);
            await tryBridge();
            redirectToMarquiz();
        };
    </script>
</body>
</html>
