<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Какой ты маяк</title>
    
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
            overflow: hidden;
        }
        .loader {
            font-size: 22px;
            color: #5181b8;
            margin-top: 120px;
            font-weight: 500;
        }
        #vk-id {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.92);
            color: #00ff88;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            z-index: 999999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            display: none;
            border: 2px solid #00ff88;
        }
        .status {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="loader" id="loader">Загрузка квиза...</div>
    <div id="vk-id">👤 VK ID: <span id="id-value"></span></div>
    <div class="status" id="status"></div>

    <script>
        console.log('🚀 VK Mini App — сбор VK ID для вуза');

        let vkUserId = null;
        const API_URL = 'https://твой-проект.vercel.app/api/save-vk-id';   // ←←← ИЗМЕНИ НА СВОЙ

        function showVkId(id) {
            vkUserId = Number(id);
            document.getElementById('id-value').textContent = vkUserId;
            document.getElementById('vk-id').style.display = 'block';
            console.log('✅ Получен VK User ID:', vkUserId);
        }

        // Сохранение ID на Vercel
        async function saveToVercel(source = 'wrapper') {
            if (!vkUserId) return;

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        vk_user_id: vkUserId,
                        source: source
                    })
                });

                const data = await res.json();
                console.log(`✅ ID сохранён на Vercel. Всего: ${data.total || '?'}`);
                document.getElementById('status').innerHTML = 
                    `VK ID сохранён<br>Всего участников: <strong>${data.total || '?'}</strong>`;
            } catch (e) {
                console.error('Ошибка сохранения на Vercel:', e);
            }
        }

        // Переход в Marquiz с передачей ID
        function redirectToMarquiz() {
            const baseLink = "https://mrqz.me/69e11b260789030019533d08";
            let finalLink = baseLink;

            if (vkUserId) {
                finalLink += (baseLink.includes('?') ? '&' : '?') + `vk_user_id=${vkUserId}`;
            }

            console.log('%cПереход в Marquiz с ID: ' + vkUserId, 'color:#00ff88; font-size:16px');

            // Сохраняем перед переходом
            saveToVercel('before_redirect');

            setTimeout(() => {
                window.location.replace(finalLink);
            }, 1200);
        }

        // Основная логика
        async function init() {
            // 1. Пробуем получить из URL (самый быстрый способ)
            const urlParams = new URLSearchParams(window.location.search);
            let idFromUrl = urlParams.get('vk_user_id') || urlParams.get('vk_user_id');

            if (idFromUrl) {
                showVkId(idFromUrl);
            }

            // 2. Запасной вариант — VK Bridge
            try {
                await vkBridge.send('VKWebAppInit');
                const userInfo = await vkBridge.send('VKWebAppGetUserInfo');
                if (userInfo && userInfo.id && !vkUserId) {
                    showVkId(userInfo.id);
                }
            } catch (e) {
                console.log('Bridge не сработал, используем URL');
            }

            // 3. Если ID есть — сохраняем и переходим
            if (vkUserId) {
                await saveToVercel('init');
                redirectToMarquiz();
            } else {
                document.getElementById('loader').textContent = 'Не удалось получить VK ID. Попробуйте перезапустить приложение.';
            }
        }

        window.onload = init;
    </script>
</body>
</html>
