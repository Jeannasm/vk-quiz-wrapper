<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Какой ты маяк</title>
    
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
            overflow: hidden;
        }
        .loader {
            font-size: 22px;
            color: #5181b8;
            margin-top: 120px;
            font-weight: 500;
        }
        #vk-id {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.92);
            color: #00ff88;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            z-index: 999999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            display: none;
            border: 2px solid #00ff88;
        }
    </style>
</head>
<body>

    <div class="loader">Загрузка квиза...</div>
    
    <!-- Блок с VK ID -->
    <div id="vk-id">👤 VK ID: <span id="id-value"></span></div>

    <script>
        console.log('🚀 VK Mini App wrapper v2 запущен');

        let vkUserId = null;

        // Функция показа ID
        function showVkId(id) {
            vkUserId = id;
            const idDiv = document.getElementById('vk-id');
            const idSpan = document.getElementById('id-value');
            idSpan.textContent = id;
            idDiv.style.display = 'block';
            window.vkUserId = id;
            window.vk_user_id = id;
            console.log('✅ Блок с VK ID показан на экране');
        }

        // Получаем ID из URL (самый надёжный способ)
        const urlParams = new URLSearchParams(window.location.search);
        vkUserId = urlParams.get('vk_user_id');

        if (vkUserId) {
            console.log('✅ VK User ID получен из URL:', vkUserId);
            showVkId(vkUserId);
        } else {
            console.warn('vk_user_id не найден в URL');
        }

        // Дополнительно пробуем через Bridge
        async function tryBridge() {
            try {
                await vkBridge.send('VKWebAppInit');
                const userInfo = await vkBridge.send('VKWebAppGetUserInfo');
                if (userInfo.id && !vkUserId) {
                    vkUserId = userInfo.id;
                    console.log('✅ VK User ID получен через Bridge:', vkUserId);
                    showVkId(vkUserId);
                }
            } catch (e) {
                console.error('Bridge error:', e);
            }
        }

        // Перенаправление в Marquiz
        function redirectToMarquiz() {
            const baseLink = "https://mrqz.me/69e11b260789030019533d08";
            
            let finalLink = baseLink;
            if (vkUserId) {
                finalLink += (baseLink.includes('?') ? '&' : '?') + `vk_user_id=${vkUserId}`;
            }

            console.log('🔄 Переходим в Marquiz с ID:', vkUserId);
            // Даём 1.2 секунды, чтобы пользователь увидел ID
            setTimeout(() => {
                window.location.replace(finalLink);
            }, 1200);
        }

        // Запуск
        window.onload = async function() {
            // Показываем ID, если он уже есть
            if (vkUserId) {
                showVkId(vkUserId);
            }

            // Пробуем Bridge на всякий случай
            await tryBridge();

            // Запускаем перенаправление
            redirectToMarquiz();
        };
    </script>
</body>
</html>
