<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Какой ты маяк</title>
    
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
            overflow: hidden;
        }
        .loader {
            font-size: 22px;
            color: #5181b8;
            margin-top: 120px;
            font-weight: 500;
        }
        #vk-id {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.92);
            color: #00ff88;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            z-index: 999999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            display: none;
            border: 2px solid #00ff88;
        }
    </style>
</head>
<body>

    <div class="loader">Загрузка квиза...</div>
    <div id="vk-id">👤 VK ID: <span id="id-value"></span></div>

    <script>
        // === Фиксы предупреждений ===
        console.log('🚀 VK Mini App wrapper запущен');

        // Инициализация Bridge
        vkBridge.send('VKWebAppInit').catch(() => {});

        let vkUserId = null;

        function showVkId(id) {
            vkUserId = id;
            const idDiv = document.getElementById('vk-id');
            document.getElementById('id-value').textContent = id;
            idDiv.style.display = 'block';
            window.vkUserId = id;
            window.vk_user_id = id;
        }

        // Получаем ID из URL
        const urlParams = new URLSearchParams(window.location.search);
        vkUserId = urlParams.get('vk_user_id');

        if (vkUserId) {
            console.log('✅ VK User ID получен:', vkUserId);
            showVkId(vkUserId);
        }

        // Дополнительно через Bridge
        async function tryBridge() {
            try {
                const userInfo = await vkBridge.send('VKWebAppGetUserInfo');
                if (userInfo.id && !vkUserId) {
                    showVkId(userInfo.id);
                }
            } catch (e) {}
        }

        function redirectToMarquiz() {
            const baseLink = "https://mrqz.me/69e11b260789030019533d08";
            let finalLink = baseLink;
            if (vkUserId) {
                finalLink += (baseLink.includes('?') ? '&' : '?') + `vk_user_id=${vkUserId}`;
            }
            setTimeout(() => {
                window.location.replace(finalLink);
            }, 1500); // задержка, чтобы увидеть ID
        }

        // Запуск
        window.onload = async () => {
            if (vkUserId) showVkId(vkUserId);
            await tryBridge();
            redirectToMarquiz();
        };
    </script>
</body>
</html>
