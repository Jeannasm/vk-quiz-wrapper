<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Какой ты маяк?</title>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f0f4ff, #e0e9ff);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .container {
            text-align: center;
            max-width: 100%;
        }
        .loader {
            font-size: 26px;
            color: #5181b8;
            margin-bottom: 40px;
        }
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container" id="loaderScreen">
        <div class="loader">Инициализация приложения...</div>
        <div style="font-size: 15px; color: #666;">Получаем ваш VK ID</div>
    </div>

    <iframe id="quizFrame" style="display: none;"></iframe>

    <script>
        // Инициализация VK Bridge
        vkBridge.send('VKWebAppInit')
            .then(() => console.log('VK Bridge инициализирован'))
            .catch(err => console.error('VK Bridge init error', err));

        async function startQuiz() {
            const loader = document.getElementById('loaderScreen');
            const iframe = document.getElementById('quizFrame');

            try {
                // Получаем данные пользователя
                const user = await vkBridge.send('VKWebAppGetUserInfo');
                
                console.log('✅ VK ID получен:', user.id);

                // ←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←←
                // ВСТАВЬ СЮДА СВОЮ ПРЯМУЮ ССЫЛКУ НА MARQUIZ
                let quizUrl = "https://mrqz.me/твоя_ссылка_на_квиз";   // ← ИЗМЕНИ ЭТУ СТРОКУ!

                // Добавляем параметры
                const params = new URLSearchParams();
                params.append('vk_id', user.id);
                if (user.first_name) params.append('first_name', user.first_name);
                if (user.last_name) params.append('last_name', user.last_name);

                const separator = quizUrl.includes('?') ? '&' : '?';
                const finalUrl = quizUrl + separator + params.toString();

                // Загружаем квиз в iframe
                iframe.src = finalUrl;
                iframe.style.display = 'block';
                loader.style.display = 'none';

            } catch (error) {
                console.error('Ошибка получения VK ID:', error);

                // Fallback — открываем квиз без ID
                let quizUrl = "https://mrqz.me/69e11b260789030019533d08";   // ← ТОЖЕ ИЗМЕНИ!
                iframe.src = quizUrl;
                iframe.style.display = 'block';
                loader.style.display = 'none';
            }
        }

        // Запускаем после загрузки страницы
        window.addEventListener('load', () => {
            // Небольшая задержка для стабильности
            setTimeout(startQuiz, 600);
        });
    </script>
</body>
</html>
