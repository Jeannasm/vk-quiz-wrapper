<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Какой ты маяк?</title>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: system-ui, Arial, sans-serif;
            background: linear-gradient(135deg, #f0f4ff, #e0e9ff);
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .loader {
            font-size: 24px;
            color: #5181b8;
            margin-bottom: 30px;
        }
        iframe {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="loader" id="loader">Загрузка квиза...</div>
    <iframe id="quizFrame" style="display: none;"></iframe>

    <script>
        // Инициализация VK Bridge
        vkBridge.send('VKWebAppInit');

        async function loadQuizWithVKID() {
            try {
                // Получаем данные пользователя
                const user = await vkBridge.send('VKWebAppGetUserInfo');
                const vkId = user.id;
                const firstName = user.first_name || '';

                console.log('VK ID получен:', vkId);

                // ←←← СЮДА ВСТАВЬ СВОЮ ССЫЛКУ НА MARQUIZ ←←←
                let marquizLink = https://mrqz.me/69e11b260789030019533d08;   // замени на реальную

                // Добавляем vk_id в URL
                const separator = marquizLink.includes('?') ? '&' : '?';
                const finalLink = `${marquizLink}${separator}vk_id=${vkId}&first_name=${encodeURIComponent(firstName)}`;

                // Показываем iframe с квизом
                const iframe = document.getElementById('quizFrame');
                iframe.src = finalLink;
                iframe.style.display = 'block';

                document.getElementById('loader').style.display = 'none';

            } catch (error) {
                console.error('Ошибка получения VK ID:', error);
                // Fallback — открываем квиз без ID
                const iframe = document.getElementById('quizFrame');
                iframe.src = "https://mrqz.me/твоя-ссылка-на-квиз";   // замени
                iframe.style.display = 'block';
                document.getElementById('loader').style.display = 'none';
            }
        }

        // Запускаем после небольшой задержки (лучше после взаимодействия, но для простоты так)
        window.onload = () => {
            setTimeout(loadQuizWithVKID, 800);
        };
    </script>
</body>
</html>
