<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Какой ты маяк</title>
    
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: system-ui, Arial, sans-serif;
            background: linear-gradient(135deg, #f0f4ff, #e0e9ff);
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .loader {
            font-size: 26px;
            color: #5181b8;
            margin-bottom: 30px;
        }
        #vk-id {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.92);
            color: #00ff88;
            padding: 12px 18px;
            border-radius: 10px;
            font-weight: bold;
            z-index: 10000;
            display: none;
        }
        .status {
            font-size: 18px;
            margin: 25px 0;
            min-height: 70px;
        }
        .btn {
            padding: 16px 45px;
            font-size: 19px;
            background: #0077ff;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,119,255,0.4);
        }
        .info { margin-top: 50px; color: #555; font-size: 14.5px; }
    </style>
</head>
<body>
    <div class="loader" id="loader">Загрузка квиза...</div>
    
    <div id="vk-id">👤 VK ID: <span id="id-value"></span></div>
    
    <div class="status" id="status">Определяем ваш VK ID...</div>

    <button class="btn" id="quiz-btn" style="display: none;" onclick="openQuiz()">
        Пройти квиз
    </button>

    <div class="info">
        После прохождения квиза ваш VK ID будет сохранён для статистики вуза
    </div>

    <script>
        let vkUserId = null;

        function showUI() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('vk-id').style.display = 'block';
            document.getElementById('quiz-btn').style.display = 'block';
            document.getElementById('status').innerHTML = `✓ VK ID получен и сохранён`;
        }

        async function saveId(source) {
            if (!vkUserId) return;
            try {
                await fetch('/api/save-vk-id', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ vk_user_id: vkUserId, source: source })
                });
            } catch (e) { console.error(e); }
        }

        function openQuiz() {
            let link = "https://mrqz.me/69e11b260789030019533d08";
            if (vkUserId) link += `?vk_user_id=${vkUserId}`;
            saveId('quiz_started');
            setTimeout(() => { window.location.replace(link); }, 600);
        }

        // Главная инициализация
        async function init() {
            console.log('🚀 Инициализация приложения...');

            // 1. Получаем из URL параметров (самый надёжный способ в VK Mini Apps)
            const params = new URLSearchParams(window.location.search);
            vkUserId = params.get('vk_user_id');

            console.log('ID из URL:', vkUserId);

            // 2. Если не нашли — используем Bridge
            if (!vkUserId) {
                try {
                    console.log('Пробуем VK Bridge...');
                    await vkBridge.send('VKWebAppInit');
                    const user = await vkBridge.send('VKWebAppGetUserInfo');
                    if (user && user.id) {
                        vkUserId = user.id;
                        console.log('ID получен через Bridge:', vkUserId);
                    }
                } catch (err) {
                    console.error('Bridge ошибка:', err);
                }
            }

            if (vkUserId) {
                document.getElementById('id-value').textContent = vkUserId;
                await saveId('app_open');
                showUI();
            } else {
                document.getElementById('loader').innerHTML = 'Не удалось получить VK ID.<br>Попробуйте перезапустить приложение из ВКонтакте.';
                document.getElementById('status').textContent = '';
            }
        }

        // Запускаем с небольшой задержкой — иногда помогает
        window.addEventListener('load', () => {
            setTimeout(init, 300);
        });
    </script>
</body>
</html>
