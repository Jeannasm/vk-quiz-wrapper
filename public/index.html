<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Какой ты маяк?</title>
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #f0f4ff, #e0e9ff);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #333;
        }
        .loader {
            text-align: center;
            font-size: 26px;
            color: #5181b8;
        }
        .status {
            font-size: 16px;
            color: #555;
            margin-top: 10px;
        }
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            position: fixed;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <div class="loader" id="loaderScreen">
        <div>Загрузка квиза...</div>
        <div class="status" id="status">Получаем VK ID</div>
    </div>

    <iframe id="quizFrame" style="display: none;"></iframe>

    <script>
        vkBridge.send('VKWebAppInit');

        async function loadQuiz() {
            const status = document.getElementById('status');
            status.textContent = "VK ID получен, открываем квиз...";

            try {
                const user = await vkBridge.send('VKWebAppGetUserInfo');
                console.log('✅ VK ID:', user.id);

                // Используем ссылку с ?mode=vk — она лучше работает в iframe
                let baseUrl = "https://mrqz.me/69e11b260789030019533d08?mode=vk";

                const params = new URLSearchParams();
                params.append('vk_id', user.id);
                if (user.first_name) params.append('first_name', user.first_name);
                if (user.last_name) params.append('last_name', user.last_name);

                // Добавляем параметры к уже существующему ?mode=vk
                const finalUrl = baseUrl + "&" + params.toString();

                const iframe = document.getElementById('quizFrame');
                iframe.src = finalUrl;
                iframe.style.display = 'block';
                document.getElementById('loaderScreen').style.display = 'none';

            } catch (e) {
                console.error(e);
                status.textContent = 'Ошибка. Попробуйте обновить страницу.';
            }
        }

        window.addEventListener('load', () => {
            setTimeout(loadQuiz, 700);
        });
    </script>
</body>
</html>
