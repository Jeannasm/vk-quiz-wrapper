<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Какой ты маяк</title>
    
    <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: system-ui, Arial, sans-serif;
            background: linear-gradient(135deg, #f0f4ff, #e0e9ff);
            text-align: center;
            min-height: 100vh;
        }
        .loader {
            font-size: 26px;
            color: #5181b8;
            margin: 40px 0 20px;
        }
        #vk-id {
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.9);
            color: #00ff88;
            padding: 12px 18px;
            border-radius: 10px;
            font-weight: bold;
            display: none;
            z-index: 10000;
        }
        .status {
            font-size: 18px;
            margin: 20px 0;
            min-height: 60px;
        }
        .btn {
            padding: 16px 40px;
            font-size: 19px;
            background: #0077ff;
            color: white;
            border: none;
            border-radius: 12px;
            margin-top: 20px;
            cursor: pointer;
        }
        .info { margin-top: 60px; color: #555; font-size: 14px; }
    </style>
</head>
<body>
    <div class="loader" id="loader">Загрузка квиза...</div>
    
    <div id="vk-id">👤 VK ID: <span id="id-value"></span></div>
    
    <div class="status" id="status"></div>

    <button class="btn" id="quiz-btn" style="display:none;" onclick="openQuiz()">
        Пройти квиз
    </button>

    <div class="info">
        После прохождения квиза ваш VK ID будет сохранён для статистики вуза
    </div>

    <script>
        let vkUserId = null;

        function showSuccess() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('vk-id').style.display = 'block';
            document.getElementById('quiz-btn').style.display = 'block';
            document.getElementById('status').innerHTML = '✓ VK ID успешно получен и сохранён';
        }

        async function saveId(source) {
            if (!vkUserId) return;
            try {
                await fetch('/api/save-vk-id', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ vk_user_id: vkUserId, source })
                });
            } catch(e) {}
        }

        function openQuiz() {
            let link = "https://mrqz.me/69e11b260789030019533d08";
            if (vkUserId) link += `?vk_user_id=${vkUserId}`;
            saveId('quiz_started');
            setTimeout(() => window.location.replace(link), 500);
        }

        // Основная функция
        async function init() {
            const params = new URLSearchParams(window.location.search);
            vkUserId = params.get('vk_user_id');

            // Если ID не пришёл через URL — пробуем Bridge
            if (!vkUserId) {
                try {
                    await vkBridge.send('VKWebAppInit');
                    const user = await vkBridge.send('VKWebAppGetUserInfo');
                    if (user?.id) vkUserId = user.id;
                } catch (e) {}
            }

            if (vkUserId) {
                document.getElementById('id-value').textContent = vkUserId;
                await saveId('app_open');
                showSuccess();
            } else {
                document.getElementById('loader').innerHTML = 'Не удалось получить VK ID.<br>Попробуйте перезапустить приложение.';
            }
        }

        window.onload = init;
    </script>
</body>
</html>
